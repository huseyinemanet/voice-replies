name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build
        run: swift build -c release

      - name: Test
        run: swift test

      - name: Build macOS app target
        run: |
          xcodebuild \
            -project VoiceReplies.xcodeproj \
            -scheme "Voice Replies macOS" \
            -configuration Release \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build iOS app target
        run: |
          xcodebuild \
            -project VoiceReplies.xcodeproj \
            -scheme "Voice Replies iOS" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            build
